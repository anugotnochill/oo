<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
body, html {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: 'Playfair Display', serif;
}

/* BACKGROUNDS */
#page1 { background: url('bg1.jpg') center/cover no-repeat; }
#page2 { background: url('bg2.jpg') center/cover no-repeat; }
#page3 { background: url('bg3.jpg') center/cover no-repeat; }
#page4 { background: url('bg4.jpg') center/cover no-repeat; }
#page5 { background: url('bg5.jpg') center/cover no-repeat; }
#page6 { background: url('bg6.jpg') center/cover no-repeat; }

/* OVERLAY */
section::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.3);
}

/* PAGE */
section {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* FRAME */
.frame {
    width: 800px;
    text-align: center;
    z-index: 2;
}

/* TEXT */
h1 {
    font-size: 70px;
    font-weight: 900;
    letter-spacing: 8px;
    color: white;
}

h2 {
    color: white;
    letter-spacing: 3px;
}

/* BUTTON */
button {
    margin: 15px;
    padding: 12px 25px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
}
button:hover {
    background: white;
    color: black;
}

/* LETTER ANIMATION */
.fade span {
    opacity: 0;
    display: inline-block;
    animation: fadeIn 0.5s forwards;
}
@keyframes fadeIn {
    to { opacity: 1; }
}

/* CONFETTI */
.confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    animation: fall 4s linear forwards;
}
@keyframes fall {
    to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}

/* HEARTS */
.heart {
    position: absolute;
    animation: floatUp 4s linear forwards;
}
@keyframes floatUp {
    to { transform: translateY(-200px); opacity: 0; }
}
</style>

</head>

<body>

<!-- AUDIO -->

<audio id="heartbeat" src="heartbeat.mp3"></audio> <audio id="music" src="bairan.mp3" loop></audio>

<!-- PAGE 1 -->

<section id="page1">
<div class="frame">
<h1 id="t1"></h1>
<button onclick="startExperience()">ENTER</button>
</div>
</section>

<!-- PAGE 2 -->

<section id="page2" style="display:none;">
<div class="frame">
<h1 id="t2"></h1>
<h2 id="text">DO YOU LIKE IT?</h2>
<button id="yes">YES</button>
<button id="no">NO</button>
</div>
</section>

<!-- PAGE 3 -->

<section id="page3" style="display:none;">
<div class="frame">
<h1 id="t3"></h1>
<button onclick="goToPage('page4')">NEXT</button>
</div>
</section>

<!-- PAGE 4 -->

<section id="page4" style="display:none;">
<div class="frame">
<h1 id="t4"></h1>
<button onclick="goToPage('page5')">NEXT</button>
</div>
</section>

<!-- PAGE 5 -->

<section id="page5" style="display:none;">
<div class="frame">
<h1 id="t5"></h1>
<button onclick="goToPage('page6')">NEXT</button>
</div>
</section>

<!-- PAGE 6 -->

<section id="page6" style="display:none;">
<div class="frame">
<h1 id="t6"></h1>
<button onclick="goToPage('page1')">REPLAY</button>
</div>
</section>

<script>
const texts = {
t1:"WHAT'S TODAY",
t2:"IT'S YOUR DAY",
t3:"HAPPY BIRTHDAY",
t4:"YOU MEAN A LOT",
t5:"ENJOY YOUR DAY",
t6:"FOREVER YOURS"
};

function animate(id,text){
let el=document.getElementById(id);
el.innerHTML="";
text.split("").forEach((l,i)=>{
let s=document.createElement("span");
s.innerHTML=l===" "?"&nbsp;":l;
s.style.animationDelay=i*0.05+"s";
s.className="fade";
el.appendChild(s);
});
}

/* INITIAL */
animate("t1",texts.t1);

/* START (AUDIO FIX) */
function startExperience(){
goToPage("page2");

let hb=document.getElementById("heartbeat");
let music=document.getElementById("music");

hb.volume=0.5;
music.volume=0.2;

hb.play();
music.play();
}

/* PAGE SWITCH */
function goToPage(id){
document.querySelectorAll("section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="flex";

let key=id.replace("page","t");
if(texts[key]) animate(key,texts[key]);

if(id==="page2") confetti();
}

/* BUTTON LOGIC */
let yes=document.getElementById("yes");
let no=document.getElementById("no");
let text=document.getElementById("text");

no.addEventListener("mouseover",()=>{
no.style.position="absolute";
no.style.left=Math.random()*80+"vw";
no.style.top=Math.random()*80+"vh";
});

yes.addEventListener("click",()=>{
text.innerText="I knew it 💖";
setTimeout(()=>goToPage("page3"),1500);
});

/* CONFETTI */
function confetti(){
for(let i=0;i<50;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=["#fff","#ff69b4","#ffd700"][Math.floor(Math.random()*3)];
document.body.appendChild(c);
setTimeout(()=>c.remove(),4000);
}
}

/* HEARTS */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),4000);
},400);
</script>

</body>
</html>
